version: 2
updates:
  # Python dependencies (pyproject.toml)
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Europe/Bucharest"
    open-pull-requests-limit: 5
    labels:
      - dependencies
    commit-message:
      prefix: "deps(python)"
    # Ignore major-version bumps for packages that touch data semantics
    # (embeddings, NER, vector storage). Their outputs can shift silently
    # even when CI passes; require deliberate manual upgrades with a
    # compatibility check.
    ignore:
      - dependency-name: "sentence-transformers"
        update-types: ["version-update:semver-major"]
      - dependency-name: "spacy"
        update-types: ["version-update:semver-major"]
      - dependency-name: "pgvector"
        update-types: ["version-update:semver-major"]
      - dependency-name: "transformers"
        update-types: ["version-update:semver-major"]
      - dependency-name: "torch"
        update-types: ["version-update:semver-major"]
      - dependency-name: "numpy"
        update-types: ["version-update:semver-major"]
    groups:
      python-deps:
        patterns: ["*"]
        update-types:
          - minor
          - patch

  # Web dependencies (web/package.json)
  - package-ecosystem: npm
    directory: "/web"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Europe/Bucharest"
    open-pull-requests-limit: 5
    labels:
      - dependencies
    commit-message:
      prefix: "deps(web)"
    groups:
      web-deps:
        patterns: ["*"]
        update-types:
          - minor
          - patch

  # GitHub Actions versions
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    labels:
      - dependencies
    commit-message:
      prefix: "deps(ci)"
    groups:
      ci-deps:
        patterns: ["*"]
        update-types:
          - minor
          - patch
          - major

  # Docker base images
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 2
    labels:
      - dependencies
    commit-message:
      prefix: "deps(docker)"
    groups:
      docker-deps:
        patterns: ["*"]
        update-types:
          - minor
          - patch
